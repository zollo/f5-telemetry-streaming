f5_do_dns_config: true
f5_do_ntp_config: true
f5_do_provisioning: true
f5_provisioning:
  ltm: nominal
f5_do_force_licensing: false
f5_do_licensing: true
f5_do_phoning_home: false
request:
  project:
    folder: /root/deploy-projects/_DEPLOYMENT_NAME_
    name: _DEPLOYMENT_NAME_
  declaration:
    instance:
    - harness:
        _copy: request/hypervisor
      name: ubuntu2404
      image: Ubuntu2404LTS-pristine
      flavor: m1.large
    - harness:
        _copy: request/hypervisor
      name: bigip_16_1
      software:
        _copy: request/software/bigip_16_1
      type: bigip
      flavor: F5-BIGIP-small
    - harness:
        _copy: request/hypervisor
      name: bigip_17_1
      software:
        _copy: request/software/bigip_17_1
      type: bigip
      flavor: F5-BIGIP-small
    - harness:
        _copy: request/hypervisor
      name: bigip_17_5
      software:
        _copy: request/software/bigip_17_5
      type: bigip
      flavor: F5-BIGIP-small
    - harness:
        _copy: request/hypervisor
      name: bigip_21_0
      software:
        _copy: request/software/bigip_21_0
      type: bigip
      flavor: F5-BIGIP-small
  hypervisor: vio
  software:
    bigip_16_1:
      default:
        force: false
        image: BIGIP-16.1.6-0.0.3
      desired:
        branch: ''
        build: 0.0.3
        iso_file: ''
        version: 16.1.6
    bigip_17_1:
      default:
        force: false
        image: BIGIP-17.1.3-0.0.11
      desired:
        branch: ''
        build: 0.0.11
        iso_file: ''
        version: 17.1.3
    bigip_17_5:
      default:
        force: false
        image: BIGIP-17.5.1-0.0.7
      desired:
        branch: ''
        build: 0.0.7
        iso_file: ''
        version: 17.5.1
    bigip_21_0:
      default:
        force: false
        image: BIGIP-21.0.0-0.0.10
      desired:
        branch: ''
        build: 0.0.10
        iso_file: ''
        version: 21.0.0
